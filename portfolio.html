<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Sreeja Ashireddy — Test Engineer | QA Automation</title>
<meta name="description" content="Sreeja Ashireddy — Test Engineer specializing in automation, API testing, and enterprise QA. Selenium, TestNG, Postman. Open to QA / SDET opportunities.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  // Apply saved theme before first paint to avoid flash
  (function(){
    let pref = 'system';
    try { pref = localStorage.getItem('theme') || 'system'; } catch(e){}
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const resolved = pref === 'system' ? (sysDark ? 'dark' : 'light') : pref;
    document.documentElement.setAttribute('data-theme', resolved);
    document.documentElement.setAttribute('data-pref', pref);
  })();
</script>
<style>
  :root{
    --cyan:#22D3EE;
    --blue:#4F8CFF;
    --violet:#8B7CF6;
    --grad:linear-gradient(92deg,var(--cyan) 0%,var(--blue) 60%,var(--violet) 100%);
    --pass:#34D399;
    --fail:#F26D78;
    --amber:#F2C94C;
    --radius:14px;
    --display:'Sora',sans-serif;
    --body:'Inter',sans-serif;
    --mono:'IBM Plex Mono',monospace;
    /* dark (default) */
    --bg:#04070F;
    --bg2:#0A1120;
    --card:#0D1526;
    --card-hi:#111B30;
    --line:#1B2740;
    --ink:#EAF1FB;
    --muted:#8FA0BC;
    --cyan-dim:rgba(34,211,238,.12);
    --cyan-line:rgba(34,211,238,.25);
    --nav-bg:rgba(4,7,15,.75);
    --glow-a:rgba(34,211,238,.14);
    --glow-b:rgba(139,124,246,.12);
    --btn-ink:#04070F;
    --shadow:0 30px 80px -24px rgba(0,0,0,.7);
    --card-shadow:0 14px 40px -18px rgba(0,0,0,.5);
    --grid-line:rgba(139,160,188,.05);
    --pass-bg:rgba(52,211,153,.08);
    --pass-line:rgba(52,211,153,.32);
  }
  [data-theme="light"]{
    --bg:#F6F8FC;
    --bg2:#EEF2F9;
    --card:#FFFFFF;
    --card-hi:#FFFFFF;
    --line:#DCE4F0;
    --ink:#0B1526;
    --muted:#54637C;
    --cyan:#0891B2;
    --blue:#2563EB;
    --violet:#7C5CE0;
    --cyan-dim:rgba(8,145,178,.08);
    --cyan-line:rgba(8,145,178,.3);
    --nav-bg:rgba(246,248,252,.8);
    --glow-a:rgba(8,145,178,.1);
    --glow-b:rgba(124,92,224,.08);
    --btn-ink:#FFFFFF;
    --pass:#0E9F6E;
    --shadow:0 30px 70px -28px rgba(11,21,38,.28);
    --card-shadow:0 10px 30px -16px rgba(11,21,38,.14);
    --grid-line:rgba(11,21,38,.04);
    --pass-bg:rgba(14,159,110,.08);
    --pass-line:rgba(14,159,110,.35);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);line-height:1.65;font-size:16px;overflow-x:hidden;transition:background .3s,color .3s;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:44px 44px}
  ::selection{background:var(--cyan);color:var(--bg)}
  .wrap{max-width:1100px;margin:0 auto;padding:0 24px}
  a:focus-visible,button:focus-visible,summary:focus-visible{outline:2px solid var(--cyan);outline-offset:3px;border-radius:6px}

  /* scroll progress */
  #progress{position:fixed;top:0;left:0;height:2px;background:var(--grad);width:0;z-index:100}

  /* ---------- nav ---------- */
  nav{position:sticky;top:0;z-index:60;background:var(--nav-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);transition:background .3s,border-color .3s}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:66px;gap:16px}
  .logo{font-family:var(--display);font-weight:700;font-size:1.02rem;text-decoration:none;color:var(--ink);letter-spacing:.01em;white-space:nowrap}
  .logo em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .nav-links{display:flex;align-items:center;gap:26px;list-style:none}
  .nav-links a{text-decoration:none;font-size:.9rem;color:var(--muted);transition:color .15s}
  .nav-links a:hover{color:var(--ink)}
  .nav-cta{background:var(--grad);color:var(--btn-ink)!important;font-weight:600;padding:9px 18px;border-radius:999px;font-size:.86rem!important}
  .nav-cta:hover{filter:brightness(1.08)}

  /* theme switch */
  .theme-switch{display:flex;align-items:center;border:1px solid var(--line);border-radius:999px;background:var(--card);padding:3px;gap:2px}
  .theme-switch button{width:30px;height:30px;border:0;border-radius:50%;background:transparent;color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:background .15s,color .15s}
  .theme-switch button:hover{color:var(--ink)}
  .theme-switch button[aria-pressed="true"]{background:var(--cyan-dim);color:var(--cyan)}
  .theme-switch svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* ---------- hero ---------- */
  .hero{position:relative;padding:88px 0 60px;display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center}
  .hero::before{content:'';position:absolute;top:-200px;left:-180px;width:560px;height:560px;background:radial-gradient(circle,var(--glow-a),transparent 65%);pointer-events:none}
  .hero::after{content:'';position:absolute;bottom:-160px;right:-140px;width:480px;height:480px;background:radial-gradient(circle,var(--glow-b),transparent 65%);pointer-events:none}
  .eyebrow{font-family:var(--mono);font-size:.76rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:16px;display:flex;align-items:center;gap:10px}
  .eyebrow::before{content:'';width:26px;height:1px;background:var(--cyan)}
  h1{font-family:var(--display);font-size:clamp(2.3rem,5.2vw,3.6rem);line-height:1.1;letter-spacing:-.025em;font-weight:800}
  h1 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .pitch{color:var(--muted);max-width:46ch;margin:22px 0 30px;font-size:1.03rem}
  .btn-row{display:flex;gap:14px;flex-wrap:wrap;position:relative;z-index:1}
  .btn{font-family:var(--display);font-weight:600;font-size:.92rem;text-decoration:none;padding:13px 26px;border-radius:999px;transition:transform .16s,box-shadow .16s,filter .16s;display:inline-block}
  .btn-grad{background:var(--grad);color:var(--btn-ink)}
  .btn-grad:hover{transform:translateY(-2px);box-shadow:0 10px 30px -8px var(--cyan-line)}
  .btn-line{border:1px solid var(--line);color:var(--ink);background:var(--card)}
  .btn-line:hover{border-color:var(--cyan);color:var(--cyan)}
  .open-pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.74rem;color:var(--pass);border:1px solid var(--pass-line);background:var(--pass-bg);border-radius:999px;padding:5px 14px;margin-bottom:18px}
  .open-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--pass);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* terminal — always dark, like a real terminal */
  .terminal{position:relative;z-index:1;background:#070D1A;border:1px solid #1B2740;border-radius:var(--radius);box-shadow:var(--shadow),0 0 0 1px rgba(34,211,238,.06);overflow:hidden;font-family:var(--mono)}
  .term-bar{display:flex;align-items:center;gap:8px;padding:13px 16px;background:#0B1322;border-bottom:1px solid #1B2740}
  .term-bar span{width:11px;height:11px;border-radius:50%}
  .term-bar .r{background:#F26D78}.term-bar .y{background:#F2C94C}.term-bar .g{background:#4FD08A}
  .term-bar .title{margin-left:auto;font-size:.7rem;color:#4E5F7D}
  .term-body{padding:20px 20px 24px;font-size:.79rem;line-height:1.95;color:#C7D6EC;min-height:278px}
  
  .term-body .ln{opacity:0;transform:translateY(4px);animation:lineIn .3s forwards}
  .term-body .ln-2{animation-delay: 0.2s}
  .term-body .ln-3{animation-delay: 0.4s}
  .term-body .ln-4{animation-delay: 0.6s}
  
  .term-body .comment{color:#4E5F7D}
  .term-body .keyword{color:#8B7CF6}
  .term-body .string{color:#34D399}
  .term-body .number{color:#F2C94C}
  .term-body .pass-text{color:#34D399;font-weight:600}

  @keyframes lineIn{to{opacity:1;transform:translateY(0)}}

  /* ---------- media queries for all devices ---------- */
  @media(max-width:968px){
    .hero{grid-template-columns:1fr;gap:40px;padding:60px 0;text-align:center}
    .eyebrow{justify-content:center}
    .eyebrow::before{display:none}
    .hero .pitch{margin:22px auto 30px}
    .btn-row{justify-content:center}
    .terminal{max-width:580px;margin:0 auto;width:100%}
  }
  @media(max-width:640px){
    .nav-links{display:none} /* Simplification for compact devices */
    .wrap{padding:0 16px}
    .term-body{font-size:.72rem;padding:16px;overflow-x:auto}
    body{background-size:22px 22px}
  }
</style>
</head>
<body>

<div id="progress"></div>

<nav>
  <div class="wrap nav-inner">
    <a href="#" class="logo">Sreeja<em>.Ashireddy</em></a>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#contact" class="nav-cta">Connect</a></li>
    </ul>
    
    <div class="theme-switch" role="radiogroup" aria-label="Theme selection">
      <button type="button" id="theme-light" aria-pressed="false" onclick="setTheme('light')" aria-label="Light theme">
