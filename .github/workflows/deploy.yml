name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main  # Triggers the deployment automatically whenever you push code here

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v5

      - name: Package Static Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # Uploads your index.html directly from the root folder

      - name: Deploy Production Files to Live Site
        id: deployment
        uses: actions/deploy-pages@v4
